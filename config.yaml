app:
  name: "Deepfake Voice Detector"
  version: "1.0.0"
  random_seed: 42
  debug: false
  output_dir: "./outputs"
  use_gpu: true

models:
  wav2vec2:
    hf_repo: "IshatShivhare/deepfake-voice-wav2vec2"
    weight_file: "wav2vec2_classifier.pth"
    config_file: "config.json"
    local_cache: "weights/wav2vec2_classifier.pth"

  rawnet2:
    hf_repo: "IshatShivhare/deepfake-rawnet2-sincnet"
    weight_file: "rawnet2_sincnet_final.pth"
    config_file: "config.json"
    local_cache: "weights/rawnet2_sincnet_final.pth"

ensemble:
  wav2vec2_weight: 0.5
  rawnet2_weight: 0.5
  threshold: 0.5

audio:
  sample_rate: 16000
  chunk_duration: 4.0
  max_samples: 64000
