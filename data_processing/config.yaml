# config.yaml
dataset:
  name: "ASVspoof2019_LA"
  base_path: "./ASVspoof2019/LA"  # Where dataset is downloaded
  output_path: "./processed_data"
  
  # How many samples to use (set to null for all)
  train_samples: 5000  # null for all
  dev_samples: 1000
  eval_samples: 1000

audio:
  sample_rate: 16000
  chunk_duration: 3.0  # seconds per chunk for analysis

features:
  n_mfcc: 40
  extract_spectral: true
  extract_temporal: true
  extract_chroma: true
  
augmentation:
  enabled: true
  train_only: true  # Only augment training data
  techniques:
    noise:
      enabled: true
      probability: 0.3
      noise_factor: 0.005
    time_stretch:
      enabled: true
      probability: 0.2
      rate_range: [0.9, 1.1]
    pitch_shift:
      enabled: false  # Disabled for speed
      probability: 0.0
      semitone_range: [-2, 2]
    codec_simulation:
      enabled: true
      probability: 0.3
      codec: "opus"
      bitrate: "16k"

processing:
  n_jobs: 4  # Parallel processing cores
  checkpoint_interval: 500  # Save progress every N files
  resume_from_checkpoint: true

feature_selection:
  run_analysis: true  # Generate feature importance graph
  top_n_features: null  # null = use all, or specify number